site_name: CDA.net Insider Preview   # 标题
site_description: CDA.net Insider Preview 2  # 简介
site_author: miner233   # 作者
repo_name: miner233/cda_pre
repo_url: https://github.com/miner233/cda_pre
include_search_page: false
search_index_only: false
copyright: Copyright &copy; 2022—2023 Miner233. 保留部分权利.
theme: 
  name: material   # 设置主题
  palette:
    - scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  eature:
    tabs: true
  logo: 'images/logo.png'   # Logo，在网站内显示
  favicon: images/logo.png  # 图标，在浏览器标签栏中显示
  language: "zh"
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - navigation.footer
    - content.tabs.link
    - content.code.copy
    - content.tooltips
    #- header.autohide
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  custom_dir: overrides

plugins:
  - search
  - redirects:
      redirect_maps:
        changelog/insiders.md: insiders/changelog.md
        conventions.md: philosophy.md
        reference/abbreviations.md: reference/tooltips.md
        reference/meta-tags.md: reference/index.md
        reference/variables.md: https://mkdocs-macros-plugin.readthedocs.io/
        sponsorship.md: insiders/index.md
        upgrading.md: upgrade.md
  - minify:
      minify_html: true

# Customization
extra:
  disqus: 'something'
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/miner233/cda_pre
  search:
    language: 'zh'
  alternate:
    - name: 简体中文
      link: /cda/
      lang: zh
    - name: English
      link: /cda/en
      lang: en

# Extensions
markdown_extensions:
  - attr_list
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - toc:
      permalink: true
  - footnotes
  - meta
  - def_list
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_png
      #emoji_generator: !!python/name:pymdownx.emoji.to_svg
      #emoji_generator: !!python/name:pymdownx.emoji.to_png_sprite
      #emoji_generator: !!python/name:pymdownx.emoji.to_svg_sprite
      #emoji_generator: !!python/name:pymdownx.emoji.to_awesome
      #emoji_generator: !!python/name:pymdownx.emoji.to_alt
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: Miner233
      repo: cda

nav:
  - 主页: index.md
  - 资源广场:
    - 首页: plaza/index.md
    - 所有资源: wizard/all.md
    - 筛选条件: wizard/filter.md
    - 作业: plaza/resource/homework/index.md
    - 小学:
      - 全部小学资源: wizard/ps/all.md
      - 按年级分类:
        - 一年级: wizard/ps/grade/ps-1.md
        - 二年级: wizard/ps/grade/ps-2.md
        - 三年级: wizard/ps/grade/ps-3.md
        - 四年级: wizard/ps/grade/ps-4.md
        - 五年级: wizard/ps/grade/ps-5.md
        - 六年级: wizard/ps/grade/ps-6.md
      - 语文: wizard/ps/chinese.md
      - 数学: wizard/ps/maths.md
      - 英语: wizard/ps/english.md
    - 初中:
      - 全部初中资源: wizard/jhs/all.md
      - 按年级分类:
        - 七年级: wizard/jhs/grade/jhs-7.md
        - 八年级: wizard/jhs/grade/jhs-8.md
        - 九年级: wizard/jhs/grade/jhs-9.md
      - 语文: wizard/jhs/chinese.md
      - 数学: wizard/jhs/maths.md
      - 英语: wizard/jhs/english.md
      - 其他: wizard/jhs/other.md
    - 高中:
      - 全部高中资源: wizard/hs/all.md
      - 按年级分类:
        - 高一年级: wizard/hs/grade/hs-1.md
        - 高二年级: wizard/hs/grade/hs-2.md
        - 高三年级: wizard/hs/grade/hs-3.md
      - 语文: wizard/hs/chinese.md
      - 数学: wizard/hs/maths.md
      - 英语: wizard/hs/english.md
      - 其他: wizard/hs/other.md
    - 资源类型:
      - 练习册:
        - 全部: plaza/resource/exercise_books/index.md
        - 伴你学: plaza/resource/exercise_books/learn_with_you/index.md
        - 新领程: plaza/resource/exercise_books/new_trail/index.md
        - 练习与测试: plaza/resource/exercise_books/practice_and_test/index.md
        - 补充习题: plaza/resource/exercise_books/supplementary_exercises/index.md
      - 课本:
        - 全部: plaza/resource/textbooks/index.md
        - 语文: plaza/resource/textbooks/chinese/index.md
        - 数学: plaza/resource/textbooks/maths/index.md
        - 英语: plaza/resource/textbooks/english/index.md
      - 作文与论文:
        - 全部: plaza/resource/composition/index.md
        - 语文: plaza/resource/composition/chinese/index.md
        - 数学: plaza/resource/composition/maths/index.md
        - 英语: plaza/resource/composition/english/index.md
      - 作业: plaza/resource/homework/index.md
  - 更多:
      - 公告: other/notice.md
      - 反馈: other/issues.md
      - App:
        - CDA.net App: other/app/about_app.md
      - 预览体验计划: other/insider_preview/index.md
      - 帮助与支持: 
        - 帮助和支持主页: other/help_and_support/home.md
        - 更新记录: other/help_and_support/update.md
        - 关于: other/help_and_support/about.md